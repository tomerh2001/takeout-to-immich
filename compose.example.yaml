# Copy this file to compose.yaml in your own deployment directory if you want
# a standalone Compose setup outside this repository.
#
# This example expects a sibling .env file using the keys from .env.example.

services:
  takeout-to-immich:
    image: ${DOCKER_IMAGE:-ghcr.io/tomerh2001/takeout-to-immich:latest}
    pull_policy: always
    # Match the host user so staged files are not created as root.
    user: "${TAKEOUT_UID:-1000}:${TAKEOUT_GID:-1000}"
    network_mode: "${DOCKER_NETWORK:-bridge}"
    env_file: .env
    environment:
      HOME: /tmp
    volumes:
      - ${RCLONE_CONFIG_PATH}:/config/rclone/rclone.conf:ro
      - ${IMMICH_GO_CONFIG_HOST_PATH}:/config/immich-go/immich-go.yaml:ro
      - ${STAGE_DIR}:${STAGE_DIR}
    command: ["--mode", "${MODE:-all}"]

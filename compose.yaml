services:
  takeout-to-immich:
    image: ${DOCKER_IMAGE:-ghcr.io/tomerh2001/takeout-to-immich:latest}
    pull_policy: always
    user: "${TAKEOUT_UID:-1000}:${TAKEOUT_GID:-1000}"
    network_mode: "${DOCKER_NETWORK:-bridge}"
    env_file: .env
    environment:
      HOME: /tmp
    volumes:
      - ${RCLONE_CONFIG_PATH}:/config/rclone/rclone.conf:ro
      - ${IMMICH_GO_CONFIG_HOST_PATH}:/config/immich-go/immich-go.yaml:ro
      - ${STAGE_DIR}:${STAGE_DIR}
    command: ["--mode", "${MODE:-all}"]
